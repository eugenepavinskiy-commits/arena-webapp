<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Арена</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #18191c; color: white; text-align: center; margin: 0; padding: 12px; }
        
        /* Вкладки */
        .nav-tabs { display: flex; justify-content: space-around; background: #22242a; padding: 6px; border-radius: 10px; margin-bottom: 12px; }
        .tab-btn { background: transparent; color: #aaa; border: none; padding: 8px 12px; font-weight: bold; border-radius: 6px; cursor: pointer; transition: 0.2s; }
        .tab-btn.active { background: #ff9800; color: #111; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Вкладка 1: Сетка Арены */
        .body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
        .cell { background: #2a2c33; border: 2px solid #3a3d47; border-radius: 8px; padding: 10px; font-size: 12px; cursor: pointer; user-select: none; }
        .cell.attack { background: #b71c1c; border-color: #f44336; }
        .cell.defend { background: #0d47a1; border-color: #2196f3; }

        /* Вкладка 2: Профиль и Моделька */
        .hero-card { background: #22242a; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .avatar-container { width: 140px; height: 180px; margin: 0 auto 10px auto; background: #1a1b1e; border: 2px dashed #444; border-radius: 10px; position: relative; display: flex; align-items: center; justify-content: center; }
        .stats-list { text-align: left; background: #1a1b1e; padding: 12px; border-radius: 8px; font-size: 13px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .plus-btn { background: #ff9800; border: none; color: black; font-weight: bold; border-radius: 4px; width: 26px; height: 26px; cursor: pointer; }

        /* Вкладка 3: Магазин */
        .shop-card { background: #22242a; border: 1px solid #333; border-radius: 10px; padding: 10px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .item-icon { width: 48px; height: 48px; background: #1a1b1e; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 10px; }
        .item-info { text-align: left; flex-grow: 1; }
        .buy-btn { background: #4caf50; border: none; color: white; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .submit-btn { width: 100%; padding: 14px; background: #ff9800; border: none; color: black; font-size: 16px; font-weight: bold; border-radius: 8px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('arena')">⚔️ Бой</button>
        <button class="tab-btn" onclick="switchTab('hero')">🛡️ Герой</button>
        <button class="tab-btn" onclick="switchTab('shop')">🛒 Магазин</button>
    </div>

    <!-- 1. ВАКЛАДКА: АРЕНА -->
    <div id="tab-arena" class="tab-content active">
        <div class="body-grid" id="grid"></div>
        <button class="submit-btn" onclick="sendBattleTurn()">Принять ход</button>
    </div>

    <!-- 2. ВКЛАДКА: ГЕРОЙ И ПРОКАЧКА -->
    <div id="tab-hero" class="tab-content">
        <div class="hero-card">
            <!-- SVG Моделька воина с экипированным оружием -->
            <div class="avatar-container" id="hero-avatar"></div>

            <div class="stats-list">
                <div class="stat-row">
                    <span>✨ Свободные очки:</span>
                    <strong id="free-points-val">5</strong>
                </div>
                <hr style="border-color:#333;">
                <div class="stat-row">
                    <span>💪 Сила: <b id="str-val">5</b></span>
                    <button class="plus-btn" onclick="upgradeStat('str')">+</button>
                </div>
                <div class="stat-row">
                    <span>⚡ Ловкость: <b id="agi-val">5%</b></span>
                    <button class="plus-btn" onclick="upgradeStat('agi')">+</button>
                </div>
                <div class="stat-row">
                    <span>🍀 Удача: <b id="luck-val">5%</b></span>
                    <button class="plus-btn" onclick="upgradeStat('luck')">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 3. ВКЛАДКА: МАГАЗИН С МОДЕЛЬКАМИ -->
    <div id="tab-shop" class="tab-content">
        <div class="shop-card">
            <div class="item-icon" id="icon-sword"></div>
            <div class="item-info">
                <div style="font-weight:bold;">Железный меч</div>
                <div style="font-size:11px; color:#aaa;">+3 к Силе урона</div>
            </div>
            <button class="buy-btn" onclick="buyItem('sword')">100 🪙</button>
        </div>
        <div class="shop-card">
            <div class="item-icon" id="icon-dagger"></div>
            <div class="item-info">
                <div style="font-weight:bold;">Охотничий кинжал</div>
                <div style="font-size:11px; color:#aaa;">+3% к Ловкости</div>
            </div>
            <button class="buy-btn" onclick="buyItem('dagger')">100 🪙</button>
        </div>
        <div class="shop-card">
            <div class="item-icon" id="icon-axe"></div>
            <div class="item-info">
                <div style="font-weight:bold;">Тяжелый топор</div>
                <div style="font-size:11px; color:#aaa;">+3% к Удаче</div>
            </div>
            <button class="buy-btn" onclick="buyItem('axe')">100 🪙</button>
        </div>
    </div>

    <script src="game.js"></script>
</body>
</html>
