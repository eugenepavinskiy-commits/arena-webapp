<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apeha RPG Arena Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #121316; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; user-select: none; }
        
        .nav-tabs { display: flex; justify-content: space-between; background: #1e2026; padding: 4px; border-radius: 10px; margin-bottom: 10px; gap: 4px; }
        .tab-btn { background: transparent; color: #888; border: none; padding: 8px 6px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 11px; flex: 1; }
        .tab-btn.active { background: #ff9800; color: #111; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Полоски здоровья и маны */
        .status-container { display: flex; justify-content: space-between; align-items: center; background: #1a1b1f; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #333; }
        .player-info { width: 45%; font-size: 11px; font-weight: bold; }
        .bar-bg { background: #333; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 3px; }
        .hp-fill { background: #4caf50; height: 100%; width: 100%; transition: width 0.3s; }
        .mp-fill { background: #2196f3; height: 100%; width: 100%; transition: width 0.3s; }

        /* Панель магии */
        .magic-bar { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
        .magic-btn { background: #22252e; border: 1px solid #3d4252; color: #fff; padding: 6px 8px; border-radius: 6px; font-size: 11px; cursor: pointer; }
        .magic-btn.active { border-color: #9c27b0; background: #4a148c; }

        /* Игровой макет человека */
        .manikin-wrapper { position: relative; width: 180px; height: 230px; margin: 0 auto 10px; background: #1e2026; border-radius: 14px; border: 2px solid #2a2d35; padding: 8px; }
        .body-part { fill: #2a2d35; stroke: #444; stroke-width: 2; cursor: pointer; transition: 0.2s; }
        .body-part.attack { fill: #d32f2f !important; stroke: #f44336; }
        .body-part.defend { fill: #1976d2 !important; stroke: #2196f3; }

        /* Вылетающий урон (Popups) */
        .damage-popup { position: absolute; font-weight: bold; font-size: 18px; animation: floatUp 1s forwards; pointer-events: none; }
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-30px) scale(1.3); }
        }

        /* Лог боя Apeha */
        .battle-log { background: #0a0b0d; border: 1px solid #222; border-radius: 8px; padding: 8px; height: 110px; overflow-y: auto; text-align: left; font-family: monospace; font-size: 11px; line-height: 1.4; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #141518; padding-bottom: 2px; }

        .submit-btn { width: 100%; padding: 12px; background: #ff9800; border: none; color: black; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 8px; }
        .shop-card { background: #1e2026; border: 1px solid #333; border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .action-btn { background: #4caf50; border: none; color: white; padding: 6px 10px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button id="btn-arena" class="tab-btn active" onclick="switchTab('arena')">⚔️ Арена</button>
        <button id="btn-boss" class="tab-btn" onclick="switchTab('boss')">🐉 Босс</button>
        <button id="btn-forge" class="tab-btn" onclick="switchTab('forge')">🔨 Кузница</button>
        <button id="btn-shop" class="tab-btn" onclick="switchTab('shop')">🛒 Лавка</button>
    </div>

    <!-- 1. ВКЛАДКА: АРЕНА (БОЙ + МАГИЯ + АНИМАЦИЯ) -->
    <div id="tab-arena" class="tab-content active">
        <div class="status-container">
            <div class="player-info" style="text-align:left;">
                <span id="p1-name">Вы</span> (<span id="p1-hp">100</span> HP)
                <div class="bar-bg"><div id="p1-hp-bar" class="hp-fill"></div></div>
                <div class="bar-bg"><div id="p1-mp-bar" class="mp-fill"></div></div>
            </div>
            <div style="font-size:14px; font-weight:bold; color:#ff9800;">VS</div>
            <div class="player-info" style="text-align:right;">
                <span id="p2-name">Противник</span> (<span id="p2-hp">100</span> HP)
                <div class="bar-bg"><div id="p2-hp-bar" class="hp-fill" style="background:#f44336;"></div></div>
            </div>
        </div>

        <!-- Заклинания -->
        <div class="magic-bar">
            <button class="magic-btn" id="spell-fire" onclick="selectSpell('fire')">🔥 Файрбол (20 MP)</button>
            <button class="magic-btn" id="spell-ice" onclick="selectSpell('ice')">❄️ Щит (15 MP)</button>
            <button class="magic-btn" id="spell-vamp" onclick="selectSpell('vamp')">🩸 Вампиризм (25 MP)</button>
        </div>

        <!-- Макета человека с контейнером под всплывающий урон -->
        <div class="manikin-wrapper" id="manikin-area">
            <svg width="180" height="230" viewBox="0 0 200 280">
                <circle id="head" class="body-part" cx="100" cy="35" r="22"/>
                <rect id="chest" class="body-part" x="70" y="65" width="60" height="50" rx="6"/>
                <rect id="belly" class="body-part" x="73" y="120" width="54" height="40" rx="6"/>
                <rect id="l_arm" class="body-part" x="35" y="65" width="28" height="80" rx="6"/>
                <rect id="r_arm" class="body-part" x="137" y="65" width="28" height="80" rx="6"/>
                <rect id="leg_left" class="body-part" x="73" y="165" width="24" height="100" rx="6"/>
                <rect id="leg_right" class="body-part" x="103" y="165" width="24" height="100" rx="6"/>
            </svg>
        </div>

        <button class="submit-btn" id="turn-btn" onclick="sendBattleTurn()">⚔️ Совершить ход</button>

        <div class="battle-log" id="battle-log">
            <div class="log-entry"><span style="color:#666;">[System]</span> Выберите 2 зоны атаки, 2 зоны защиты и заклинание.</div>
        </div>
    </div>

    <!-- 2. ВКЛАДКА: РЕЙД НА БОССА -->
    <div id="tab-boss" class="tab-content">
        <div style="background:#1e2026; padding:15px; border-radius:12px; border:1px solid #d32f2f;">
            <div style="font-size:40px;">🐉</div>
            <h3 style="margin:5px 0; color:#f44336;">Древний Дракон</h3>
            <p style="font-size:12px; color:#aaa;">Мировой Босс сервера.</p>
            <button class="submit-btn" style="background:#d32f2f; color:white;" onclick="attackBoss()">🔥 Нанести удар</button>
        </div>
    </div>

    <!-- 3. ВКЛАДКА: КУЗНИЦА И ЗАТОЧКА -->
    <div id="tab-forge" class="tab-content">
        <div style="background:#1e2026; padding:15px; border-radius:12px; border:1px solid #ff9800;">
            <div style="font-size:40px;">🔨</div>
            <h3>Кузница Артефактов</h3>
            <p style="font-size:12px; color:#aaa;">Увеличьте уровень заточки вашего оружия (+1...+5).</p>
            <button class="submit-btn" style="background:#ff9800; color:#111;" onclick="upgradeWeapon()">🔨 Заточить Оружие (100 🪙)</button>
        </div>
    </div>

    <!-- 4. ВКЛАДКА: ЛАВКА -->
    <div id="tab-shop" class="tab-content">
        <div class="shop-card">
            <div style="text-align:left;">
                <div style="font-weight:bold;">⚔️ Железный меч</div>
                <div style="font-size:11px; color:#aaa;">+3 Урон</div>
            </div>
            <button class="action-btn" onclick="buyItem('sword')">100 🪙</button>
        </div>
        <div class="shop-card">
            <div style="text-align:left;">
                <div style="font-weight:bold;">🧪 Зелье Маны (MP)</div>
                <div style="font-size:11px; color:#aaa;">+50 MP</div>
            </div>
            <button class="action-btn" onclick="buyItem('potion_mp')">50 🪙</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        // WEB AUDIO API - Синтезатор звуков
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);

                if (type === 'hit') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.1);
                } else if (type === 'magic') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(400, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(800, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                }
            } catch(e){}
        }

        const bodyParts = ['head', 'chest', 'belly', 'l_arm', 'r_arm', 'leg_left', 'leg_right'];
        let selectedAttacks = [], selectedDefends = [];
        let selectedSpell = null;

        bodyParts.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.onclick = () => { playSound('hit'); togglePartSelect(id, el); };
        });

        function togglePartSelect(id, element) {
            if (selectedAttacks.includes(id)) {
                selectedAttacks = selectedAttacks.filter(i => i !== id);
                selectedDefends.push(id);
                element.className.baseVal = 'body-part defend';
            } else if (selectedDefends.includes(id)) {
                selectedDefends = selectedDefends.filter(i => i !== id);
                element.className.baseVal = 'body-part';
            } else {
                if (selectedAttacks.length < 2) {
                    selectedAttacks.push(id);
                    element.className.baseVal = 'body-part attack';
                } else if (selectedDefends.length < 2) {
                    selectedDefends.push(id);
                    element.className.baseVal = 'body-part defend';
                }
            }
        }

        function selectSpell(spell) {
            playSound('magic');
            selectedSpell = (selectedSpell === spell) ? null : spell;
            document.querySelectorAll('.magic-btn').forEach(b => b.classList.remove('active'));
            if (selectedSpell) document.getElementById('spell-' + spell).classList.add('active');
        }

        function spawnDamagePopup(text, color) {
            const area = document.getElementById('manikin-area');
            const popup = document.createElement('div');
            popup.className = 'damage-popup';
            popup.innerText = text;
            popup.style.color = color || '#f44336';
            popup.style.left = (Math.random() * 80 + 50) + 'px';
            popup.style.top = (Math.random() * 80 + 50) + 'px';
            area.appendChild(popup);
            setTimeout(() => popup.remove(), 1000);
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        function sendBattleTurn() {
            if (selectedAttacks.length !== 2 || selectedDefends.length !== 2) {
                alert("Выберите 2 зоны атаки и 2 зоны защиты!");
                return;
            }
            spawnDamagePopup('ХОД!', '#ff9800');
            if (tg) {
                tg.sendData(JSON.stringify({ 
                    type: 'turn', 
                    attacks: selectedAttacks, 
                    defends: selectedDefends,
                    spell: selectedSpell
                }));
            }
        }

        function attackBoss() {
            playSound('hit');
            if (tg) tg.sendData(JSON.stringify({ type: 'attack_boss' }));
        }

        function upgradeWeapon() {
            if (tg) tg.sendData(JSON.stringify({ type: 'upgrade_weapon' }));
        }

        function buyItem(itemKey) {
            if (tg) tg.sendData(JSON.stringify({ type: 'buy', item: itemKey }));
        }
    </script>
</body>
</html>
