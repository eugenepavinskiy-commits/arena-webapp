<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena RPG Web App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 480px;
        }
        /* Исправленная верхняя панель без наложений */
        .top-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 8px 12px;
            background: rgba(30, 30, 30, 0.9);
            border-radius: 8px;
            font-size: 13px;
            gap: 6px;
            margin-bottom: 10px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .resource-item {
            display: flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }
        .card {
            background: rgba(25, 25, 25, 0.9);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }
        .btn {
            background-color: #2ea44f;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        .btn:active {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Аккуратная шапка ресурсов без наложений -->
        <div class="top-bar">
            <div class="resource-item">🪙 Золото: <span id="gold">510</span></div>
            <div class="resource-item">💎 Камни: <span id="gems">12</span></div>
            <div class="resource-item">⭐ Опыт: <span id="exp">30/140</span></div>
            <div class="resource-item">🏆 Ранг: <span id="rank">0</span></div>
        </div>

        <div class="card">
            <h2>Лагерь Героя</h2>
            <p>Добро пожаловать на Арену! Сражайся с монстрами, прокачивай своего персонажа и поднимайся в рейтинге.</p>
            <button class="btn" onclick="alert('В бой!')">В бой против монстра</button>
        </div>
    </div>

    <script>
        // Инициализация Telegram Web App
        let tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
