<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Арена</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #18191c; color: white; text-align: center; margin: 0; padding: 12px; }
        
        .nav-tabs { display: flex; justify-content: space-around; background: #22242a; padding: 6px; border-radius: 10px; margin-bottom: 12px; }
        .tab-btn { background: transparent; color: #aaa; border: none; padding: 10px 14px; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 14px; }
        .tab-btn.active { background: #ff9800; color: #111; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .body-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 12px 0; }
        .cell { background: #2a2c33; border: 2px solid #3a3d47; border-radius: 8px; padding: 12px; font-size: 12px; cursor: pointer; user-select: none; }
        .cell.attack { background: #b71c1c; border-color: #f44336; }
        .cell.defend { background: #0d47a1; border-color: #2196f3; }

        .hero-card { background: #22242a; border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .avatar { width: 100px; height: 100px; margin: 0 auto 10px; background: #2f323b; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 50px; border: 2px solid #ff9800; }
        .stats-list { text-align: left; background: #1a1b1e; padding: 12px; border-radius: 8px; font-size: 14px; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .plus-btn { background: #ff9800; border: none; color: black; font-weight: bold; border-radius: 6px; width: 32px; height: 32px; font-size: 18px; cursor: pointer; }

        .shop-card { background: #22242a; border: 1px solid #333; border-radius: 10px; padding: 12px; margin-bottom: 10px; display: flex; align-items: center; justify-content: space-between; }
        .item-info { text-align: left; }
        .buy-btn { background: #4caf50; border: none; color: white; padding: 10px 14px; border-radius: 6px; font-weight: bold; cursor: pointer; }

        .submit-btn { width: 100%; padding: 14px; background: #ff9800; border: none; color: black; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button id="btn-arena" class="tab-btn active" onclick="switchTab('arena')">⚔️ Бой</button>
        <button id="btn-hero" class="tab-btn" onclick="switchTab('hero')">🛡️ Герой</button>
        <button id="btn-shop" class="tab-btn" onclick="switchTab('shop')">🛒 Магазин</button>
    </div>

    <!-- ВАКЛАДКА 1: БОЙ -->
    <div id="tab-arena" class="tab-content active">
        <div class="body-grid" id="grid"></div>
        <button class="submit-btn" onclick="sendBattleTurn()">Принять ход</button>
    </div>

    <!-- ВКЛАДКА 2: ГЕРОЙ -->
    <div id="tab-hero" class="tab-content">
        <div class="hero-card">
            <div class="avatar" id="hero-avatar">🗡️</div>
            <div class="stats-list">
                <div class="stat-row">
                    <span>✨ Очки прокачки:</span>
                    <strong id="free-points-val">5</strong>
                </div>
                <hr style="border-color:#333; margin: 10px 0;">
                <div class="stat-row">
                    <span>💪 Сила: <b id="str-val">5</b></span>
                    <button class="plus-btn" onclick="upgradeStat('str')">+</button>
                </div>
                <div class="stat-row">
                    <span>⚡ Ловкость: <b id="agi-val">5%</b></span>
                    <button class="plus-btn" onclick="upgradeStat('agi')">+</button>
                </div>
                <div class="stat-row">
                    <span>🍀 Удача: <b id="luck-val">5%</b></span>
                    <button class="plus-btn" onclick="upgradeStat('luck')">+</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ВКЛАДКА 3: МАГАЗИН -->
    <div id="tab-shop" class="tab-content">
        <div class="shop-card">
            <div class="item-info">
                <div style="font-weight:bold;">⚔️ Железный меч</div>
                <div style="font-size:12px; color:#aaa;">+3 к Силе урона</div>
            </div>
            <button class="buy-btn" onclick="buyItem('sword')">100 🪙</button>
        </div>
        <div class="shop-card">
            <div class="item-info">
                <div style="font-weight:bold;">🗡️ Охотничий кинжал</div>
                <div style="font-size:12px; color:#aaa;">+3% к Ловкости</div>
            </div>
            <button class="buy-btn" onclick="buyItem('dagger')">100 🪙</button>
        </div>
        <div class="shop-card">
            <div class="item-info">
                <div style="font-weight:bold;">🪓 Тяжелый топор</div>
                <div style="font-size:12px; color:#aaa;">+3% к Удаче</div>
            </div>
            <button class="buy-btn" onclick="buyItem('axe')">100 🪙</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp || { expand: ()=>{}, sendData: ()=>{} };
        try { tg.expand(); } catch(e){}

        const parts = [
            { id: 'head_left', name: '🙆‍♂️ Голова (Л)' }, { id: 'head_right', name: '🙆‍♂️ Голова (П)' },
            { id: 'chest_left', name: '🛡️ Грудь (Л)' }, { id: 'chest_right', name: '🛡️ Грудь (П)' },
            { id: 'l_arm_top', name: '🥊 Л.Рука (В)' }, { id: 'r_arm_top', name: '🥊 П.Рука (В)' },
            { id: 'belly_top', name: '腹 Живот (В)' }, { id: 'belly_bot', name: '腹 Живот (Н)' },
            { id: 'leg_left', name: '🦿 Нога (Л)' }, { id: 'leg_right', name: '🦿 Нога (П)' }
        ];

        let selectedAttacks = [], selectedDefends = [];
        let freePoints = 5, strVal = 5, agiVal = 5, luckVal = 5;

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        function renderGrid() {
            const grid = document.getElementById('grid');
            grid.innerHTML = '';
            parts.forEach(p => {
                const cell = document.createElement('div');
                cell.className = 'cell';
                cell.innerText = p.name;
                cell.onclick = () => toggleSelect(p.id, cell);
                grid.appendChild(cell);
            });
        }

        function toggleSelect(id, cell) {
            if (selectedAttacks.includes(id)) {
                selectedAttacks = selectedAttacks.filter(i => i !== id);
                selectedDefends.push(id);
                cell.className = 'cell defend';
            } else if (selectedDefends.includes(id)) {
                selectedDefends = selectedDefends.filter(i => i !== id);
                cell.className = 'cell';
            } else {
                if (selectedAttacks.length < 2) {
                    selectedAttacks.push(id);
                    cell.className = 'cell attack';
                } else if (selectedDefends.length < 2) {
                    selectedDefends.push(id);
                    cell.className = 'cell defend';
                }
            }
        }

        function upgradeStat(stat) {
            if (freePoints <= 0) return;
            freePoints--;
            if (stat === 'str') strVal++;
            if (stat === 'agi') agiVal++;
            if (stat === 'luck') luckVal++;
            
            document.getElementById('free-points-val').innerText = freePoints;
            document.getElementById('str-val').innerText = strVal;
            document.getElementById('agi-val').innerText = agiVal + '%';
            document.getElementById('luck-val').innerText = luckVal + '%';

            tg.sendData(JSON.stringify({ type: 'upgrade', stat: stat }));
        }

        function sendBattleTurn() {
            if (selectedAttacks.length !== 2 || selectedDefends.length !== 2) {
                alert("Выберите 2 зоны атаки (красные) и 2 зоны защиты (синие)!");
                return;
            }
            tg.sendData(JSON.stringify({ type: 'turn', attacks: selectedAttacks, defends: selectedDefends }));
        }

        function buyItem(weaponKey) {
            const avatars = { sword: '⚔️', dagger: '🗡️', axe: '🪓' };
            document.getElementById('hero-avatar').innerText = avatars[weaponKey] || '🗡️';
            tg.sendData(JSON.stringify({ type: 'buy', weapon: weaponKey }));
        }

        renderGrid();
    </script>
</body>
</html>
