<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apeha Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #121316; color: #fff; text-align: center; margin: 0; padding: 12px; }
        
        .header-title { font-size: 16px; font-weight: bold; color: #ff9800; margin-bottom: 8px; }
        .sub-text { font-size: 12px; color: #aaa; margin-bottom: 12px; }

        /* Полоски Здоровья */
        .status-box { display: flex; justify-content: space-between; align-items: center; background: #1a1b20; border: 1px solid #333; padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .p-info { width: 45%; font-size: 12px; font-weight: bold; }
        .hp-bar-bg { background: #333; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 4px; }
        .hp-bar-fill { background: #4caf50; height: 100%; width: 100%; }

        /* Кнопки выбора зон тела */
        .grid-container { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; max-width: 320px; margin: 0 auto 15px auto; }
        .zone-btn { background: #2a2d36; border: 2px solid #444; color: #fff; font-size: 13px; font-weight: bold; padding: 12px 4px; border-radius: 8px; cursor: pointer; text-align: center; }
        
        /* Состояния: Атака (Красный) и Защита (Синий) */
        .zone-btn.attack { background: #b71c1c !important; border-color: #f44336 !important; color: #fff !important; }
        .zone-btn.defend { background: #0d47a1 !important; border-color: #2196f3 !important; color: #fff !important; }

        .action-btn { width: 100%; max-width: 320px; padding: 14px; background: #ff9800; border: none; color: #000; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 5px; }
        
        /* Лог боя */
        .log-box { background: #0a0b0d; border: 1px solid #222; border-radius: 8px; padding: 10px; height: 120px; overflow-y: auto; text-align: left; font-family: monospace; font-size: 11px; margin-top: 15px; max-width: 320px; margin-left: auto; margin-right: auto; }
        .log-line { margin-bottom: 4px; border-bottom: 1px solid #18191e; padding-bottom: 2px; color: #ccc; }
    </style>
</head>
<body>

    <div class="header-title">⚔️ Apeha RPG Арена</div>
    <div class="sub-text">Нажмите 2 зоны для атаки и 2 зоны для защиты</div>

    <div class="status-box">
        <div class="p-info" style="text-align:left;"> Вы (100 HP)
            <div class="hp-bar-bg"><div class="hp-bar-fill"></div></div>
        </div>
        <div style="color:#ff9800; font-size:14px; font-weight:bold;">VS</div>
        <div class="p-info" style="text-align:right;"> Враг (100 HP)
            <div class="hp-bar-bg"><div class="hp-bar-fill" style="background:#f44336;"></div></div>
        </div>
    </div>

    <!-- СЕТКА ЗОН С УНИВЕРСАЛЬНОЙ ОБРАБОТКОЙ -->
    <div class="grid-container">
        <div class="zone-btn" style="grid-column: span 3;" data-zone="head">🙆‍♂️ Голова</div>
        <div class="zone-btn" data-zone="l_arm">🖐️ Л.Рука</div>
        <div class="zone-btn" data-zone="chest">🛡️ Грудь</div>
        <div class="zone-btn" data-zone="r_arm">🖐️ П.Рука</div>
        <div class="zone-btn" style="grid-column: span 3;" data-zone="belly">🥊 Живот</div>
        <div class="zone-btn" style="grid-column: span 1.5;" data-zone="leg_left">🦵 Л.Нога</div>
        <div class="zone-btn" style="grid-column: span 1.5;" data-zone="leg_right">🦵 П.Нога</div>
    </div>

    <button class="action-btn" id="send-btn">⚔️ СОВЕРШИТЬ ХОД</button>

    <div class="log-box" id="log-box">
        <div class="log-line"><span style="color:#666;">[System]</span> Выберите зоны. 1-е нажатие — Атака, 2-е — Защита.</div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) {
            try {
                tg.ready();
                tg.expand();
            } catch(e) {}
        }

        let attacks = [];
        let defends = [];

        // Навешиваем слушатели событий прямо на элементы
        document.querySelectorAll('.zone-btn').forEach(btn => {
            const handleSelect = (e) => {
                e.preventDefault();
                const zone = btn.getAttribute('data-zone');
                
                if (attacks.includes(zone)) {
                    // Перевод из Атаки в Защиту
                    attacks = attacks.filter(z => z !== zone);
                    defends.push(zone);
                    btn.classList.remove('attack');
                    btn.classList.add('defend');
                } else if (defends.includes(zone)) {
                    // Сброс
                    defends = defends.filter(z => z !== zone);
                    btn.classList.remove('defend');
                } else {
                    // Выбор зоны
                    if (attacks.length < 2) {
                        attacks.push(zone);
                        btn.classList.add('attack');
                    } else if (defends.length < 2) {
                        defends.push(zone);
                        btn.classList.add('defend');
                    }
                }
            };

            btn.addEventListener('touchstart', handleSelect, { passive: false });
            btn.addEventListener('click', handleSelect);
        });

        document.getElementById('send-btn').addEventListener('click', () => {
            if (attacks.length !== 2 || defends.length !== 2) {
                alert("Выберите ровно 2 зоны для атаки (красные) и 2 для защиты (синие)!");
                return;
            }

            const log = document.getElementById('log-box');
            const entry = document.createElement('div');
            entry.className = 'log-line';
            entry.innerHTML = <span style="color:#ff9800;">[Ход]</span> Атака: ${attacks.join(', ')} | Защита: ${defends.join(', ')};
            log.appendChild(entry);

            if (tg) {
                tg.sendData(JSON.stringify({
                    type: 'turn',
                    attacks: attacks,
                    defends: defends
                }));
            }
        });
    </script>
</body>
</html>
