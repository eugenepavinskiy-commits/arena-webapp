<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Арена</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { 
            font-family: sans-serif; 
            background-color: var(--tg-theme-bg-color, #1e1e1e); 
            color: var(--tg-theme-text-color, #ffffff); 
            margin: 0; padding: 15px; text-align: center; 
        }
        
        .screen { display: none; }
        #setup-screen { display: block; }
        
        .game-image { width: 100%; max-height: 150px; object-fit: cover; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 4px 8px rgba(0,0,0,0.5); }
        .points-box { font-size: 18px; color: #ffaa00; margin-bottom: 20px; font-weight: bold; }
        .stat-row { display: flex; justify-content: space-between; align-items: center; background: #2a2a2a; padding: 12px; margin-bottom: 10px; border-radius: 10px; }
        .stat-name { font-size: 16px; font-weight: bold; }
        .stat-value { font-size: 18px; width: 40px; }
        .btn-add { background: #4caf50; color: white; border: none; padding: 8px 15px; font-size: 18px; border-radius: 8px; cursor: pointer; }
        .btn-add:disabled { background: #555; }
        
        .health-box { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 16px; font-weight: bold; color: #ff5252; background: #2a2a2a; padding: 15px; border-radius: 10px; }
        #battle-log { background: #111; padding: 10px; height: 140px; overflow-y: scroll; border-radius: 10px; text-align: left; margin-bottom: 15px; font-family: monospace; font-size: 12px; line-height: 1.4; border: 1px solid #333; }
        
        /* === ИНТЕРФЕЙС БОЯ С СИЛУЭТАМИ === */
        .battle-controls { background: #2a2a2a; padding: 15px; border-radius: 10px; margin-bottom: 15px; }
        .figures-container { display: flex; justify-content: space-around; align-items: flex-start; margin-bottom: 15px; }
        
        .combat-figure { display: flex; flex-direction: column; align-items: center; }
        .figure-title { font-size: 14px; margin-bottom: 15px; font-weight: bold; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .atk-title { color: #ff5252; }
        .blk-title { color: #64b5f6; }

        /* Сетка в форме силуэта */
        .body-grid {
            display: grid;
            grid-template-columns: 35px 35px 35px;
            grid-template-rows: 35px 35px 35px 35px;
            gap: 5px;
            position: relative;
        }

        /* Позиции чекбоксов */
        .cell-head { grid-column: 2; grid-row: 1; }
        .cell-larm { grid-column: 1; grid-row: 2; }
        .cell-chest { grid-column: 2; grid-row: 2; }
        .cell-rarm { grid-column: 3; grid-row: 2; }
        .cell-stomach { grid-column: 2; grid-row: 3; }
        .cell-legs { grid-column: 2; grid-row: 4; }

        /* Стили самих квадратиков */
        .zone-cb { cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .zone-cb input { display: none; }
        .zone-cb span { 
            display: block; width: 100%; height: 100%; background: #111; 
            border: 2px solid #555; border-radius: 4px; transition: 0.2s; 
            position: relative;
        }

        /* Галочка при выборе */
        .zone-cb span::after {
            content: '✔';
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; font-size: 18px;
        }
        .zone-cb input:checked + span::after { display: block; }

        /* Цвета УДАРА (Красный) */
        .atk-figure .zone-cb input:checked + span { background: #e53935; border-color: #ff8a80; }
        /* Цвета БЛОКА (Синий) */
        .blk-figure .zone-cb input:checked + span { background: #1e88e5; border-color: #82b1ff; }

        .btn-action { background: #4caf50; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 10px; width: 100%; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .btn-restart { background: #ffaa00; color: #000; margin-top: 15px; }
    </style>
</head>
<body>

    <!-- ЭКРАН 1: ПРОКАЧКА -->
    <div id="setup-screen" class="screen">
        <h2>Подготовка к бою</h2>
        <img src="https://dummyimage.com/600x300/2b2b2b/ffffff&text=Ваш+Рыцарь" alt="Герой" class="game-image">
        <div class="points-box">Свободных очков: <span id="points">5</span></div>

        <div class="stat-row">
            <span class="stat-name">⚔️ Сила</span>
            <span class="stat-value" id="val-str">10</span>
            <button class="btn-add" onclick="addStat('str', 1)">+</button>
        </div>
        <div class="stat-row">
            <span class="stat-name">🏃 Ловкость</span>
            <span class="stat-value" id="val-agi">10</span>
            <button class="btn-add" onclick="addStat('agi', 1)">+</button>
        </div>
        <div class="stat-row">
            <span class="stat-name">❤️ Здоровье</span>
            <span class="stat-value" id="val-hp">100</span>
            <button class="btn-add" onclick="addStat('hp', 10)">+</button>
        </div>

        <button id="start-btn" class="btn-action" style="display:none;" onclick="startBattle()">В БОЙ! 🛡</button>
    </div>

    <!-- ЭКРАН 2: АРЕНА -->
    <div id="battle-screen" class="screen">
        <h2>Арена</h2>
        <div class="health-box">
            <span>Вы: <span id="my-hp">100</span> ❤️</span>
            <span>Враг: <span id="enemy-hp">50</span> ❤️</span>
        </div>
        
        <div id="battle-log"></div>
        
        <!-- ПАНЕЛЬ С СИЛУЭТАМИ -->
        <div id="battle-ui" class="battle-controls">
            <div class="figures-container">
                
                <!-- ФИГУРА УДАРА -->
                <div class="combat-figure atk-figure">
                    <div class="figure-title atk-title">Удар (2)</div>
                    <div class="body-grid">
                        <label class="zone-cb cell-head"><input type="checkbox" name="atk" value="head"><span></span></label>
                        <label class="zone-cb cell-larm"><input type="checkbox" name="atk" value="l_arm"><span></span></label>
                        <label class="zone-cb cell-chest"><input type="checkbox" name="atk" value="chest"><span></span></label>
                        <label class="zone-cb cell-rarm"><input type="checkbox" name="atk" value="r_arm"><span></span></label>
                        <label class="zone-cb cell-stomach"><input type="checkbox" name="atk" value="stomach"><span></span></label>
                        <label class="zone-cb cell-legs"><input type="checkbox" name="atk" value="legs"><span></span></label>
                    </div>
                </div>

                <!-- ФИГУРА БЛОКА -->
                <div class="combat-figure blk-figure">
                    <div class="figure-title blk-title">Блок (2)</div>
                    <div class="body-grid">
                        <label class="zone-cb cell-head"><input type="checkbox" name="blk" value="head"><span></span></label>
                        <label class="zone-cb cell-larm"><input type="checkbox" name="blk" value="l_arm"><span></span></label>
                        <label class="zone-cb cell-chest"><input type="checkbox" name="blk" value="chest"><span></span></label>
                        <label class="zone-cb cell-rarm"><input type="checkbox" name="blk" value="r_arm"><span></span></label>
                        <label class="zone-cb cell-stomach"><input type="checkbox" name="blk" value="stomach"><span></span></label>
                        <label class="zone-cb cell-legs"><input type="checkbox" name="blk" value="legs"><span></span></label>
                    </div>
                </div>

            </div>
            
            <button class="btn-action" onclick="makeTurn()">Применить</button>
        </div>

        <button class="btn-action btn-restart" id="restart-btn" style="display:none;" onclick="resetGame()">Начать заново 🔄</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); 

        let stats = { points: 5, str: 10, agi: 10, hp: 100, maxHp: 100 };
        let enemy = { name: 'Грифон', hp: 50, maxHp: 50, str: 8 };

        const zoneNames = { 'head': 'голову', 'chest': 'грудь', 'stomach': 'живот', 'legs': 'ноги', 'l_arm': 'левую руку', 'r_arm': 'правую руку' };
        const zones = ['head', 'chest', 'stomach', 'legs', 'l_arm', 'r_arm'];

        tg.CloudStorage.getItem('arenaStats', function(error, value) {
            if (!error && value) { stats = JSON.parse(value); }
            updateSetupUI();
        });

        function addStat(type, amount) {
            if (stats.points > 0) {
                stats[type] += amount;
                stats.points -= 1;
                if(type === 'hp') stats.maxHp += amount; 
                updateSetupUI();
            }
        }

        function updateSetupUI() {
            document.getElementById('points').innerText = stats.points;
            document.getElementById('val-str').innerText = stats.str;
            document.getElementById('val-agi').innerText = stats.agi;
            document.getElementById('val-hp').innerText = stats.hp;

            if (stats.points === 0) {
                document.querySelectorAll('.btn-add').forEach(btn => btn.disabled = true);
                document.getElementById('start-btn').style.display = 'block';
                tg.CloudStorage.setItem('arenaStats', JSON.stringify(stats));
            }
        }

        function startBattle() {
            document.getElementById('setup-screen').style.display = 'none';
            document.getElementById('battle-screen').style.display = 'block';
            
            stats.hp = stats.maxHp; 
            enemy.hp = enemy.maxHp;
            
            document.getElementById('battle-log').innerHTML = "Бой начался! Выберите 2 удара и 2 блока.<br><br>";
            document.querySelectorAll('input[type="checkbox"]').forEach(cb => cb.checked = false);
            updateBattleUI();
        }

        function updateBattleUI() {
            document.getElementById('my-hp').innerText = stats.hp;
            document.getElementById('enemy-hp').innerText = enemy.hp;
        }

        function logMessage(msg) {
            let log = document.getElementById('battle-log');
            log.innerHTML = msg + "<br><br>" + log.innerHTML; 
        }

        function getCheckedValues(name) {
            let ele = document.getElementsByName(name);
            let values = [];
            for(let i = 0; i < ele.length; i++) {
                if(ele[i].checked) values.push(ele[i].value);
            }
            return values;
        }

        function getRandomZones() {
            let shuffled = zones.sort(() => 0.5 - Math.random());
            return [shuffled[0], shuffled[1]];
        }

        function makeTurn() {
            let pAtk = getCheckedValues('atk');
            let pBlk = getCheckedValues('blk');

            if (pAtk.length !== 2 || pBlk.length !== 2) {
                tg.showAlert("Выберите ровно 2 зоны для удара и 2 зоны для блока!");
                return;
            }

            let eAtk = getRandomZones();
            let eBlk = getRandomZones();
            let turnLog = `<b>--- Обмен ударами ---</b><br>`;

            // АТАКА
            pAtk.forEach(zone => {
                if (eBlk.includes(zone)) {
                    turnLog += `🛡 Враг заблокировал ваш удар в ${zoneNames[zone]}!<br>`;
                } else {
                    let pDmg = Math.floor(stats.str / 1.5) + Math.floor(Math.random() * 4);
                    enemy.hp -= pDmg;
                    turnLog += `⚔️ Вы пробили ${zoneNames[zone]} на ${pDmg} урона!<br>`;
                }
            });

            if (enemy.hp <= 0) {
                enemy.hp = 0;
                updateBattleUI();
                logMessage(turnLog + `🏆 <b>${enemy.name} ПОВЕРЖЕН!</b>`);
                endBattle();
                return;
            }

            // ЗАЩИТА
            eAtk.forEach(zone => {
                let dodgeChance = stats.agi * 1.5; 
                if (Math.random() * 100 <= dodgeChance) {
                    turnLog += `💨 Вы ловко уклонились от удара в ${zoneNames[zone]}!<br>`;
                } 
                else if (pBlk.includes(zone)) {
                    turnLog += `🛡 Вы успешно заблокировали удар в ${zoneNames[zone]}!<br>`;
                } 
                else {
                    let eDmg = Math.floor(enemy.str / 1.5) + Math.floor(Math.random() * 4);
                    stats.hp -= eDmg;
                    turnLog += `🩸 Враг пробил вашу защиту (${zoneNames[zone]}) на ${eDmg} урона!<br>`;
                }
            });

            if (stats.hp <= 0) {
                stats.hp = 0;
                updateBattleUI();
                logMessage(turnLog + `☠️ <b>ВЫ ПОГИБЛИ НА АРЕНЕ...</b>`);
                endBattle();
                return;
            }

            updateBattleUI();
            logMessage(turnLog);
        }

        function endBattle() {
            document.getElementById('battle-ui').style.display = 'none';
            document.getElementById('restart-btn').style.display = 'block';
        }

        function resetGame() {
            tg.CloudStorage.removeItem('arenaStats');
            stats = { points: 5, str: 10, agi: 10, hp: 100, maxHp: 100 };
            enemy.hp = enemy.maxHp;
            
            document.querySelectorAll('.btn-add').forEach(btn => btn.disabled = false);
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('battle-ui').style.display = 'block';
            document.getElementById('restart-btn').style.display = 'none';
            
            document.getElementById('battle-screen').style.display = 'none';
            document.getElementById('setup-screen').style.display = 'block';
            
            updateSetupUI();
        }
    </script>
</body>
</html>
