<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Apeha RPG Arena</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #141518; color: #e0e0e0; text-align: center; margin: 0; padding: 10px; user-select: none; }
        
        /* Вкладки */
        .nav-tabs { display: flex; justify-content: space-around; background: #1f2128; padding: 4px; border-radius: 10px; margin-bottom: 12px; border: 1px solid #2d303b; }
        .tab-btn { background: transparent; color: #888; border: none; padding: 10px 8px; font-weight: bold; border-radius: 8px; cursor: pointer; font-size: 13px; width: 32%; }
        .tab-btn.active { background: #ff9800; color: #111; }
        
        /* Изоляция вкладок */
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Полоски Здоровья */
        .status-container { display: flex; justify-content: space-between; align-items: center; background: #1e2026; padding: 8px 12px; border-radius: 8px; margin-bottom: 10px; border: 1px solid #2d303b; }
        .player-info { width: 45%; font-size: 11px; font-weight: bold; }
        .bar-bg { background: #333; height: 8px; border-radius: 4px; overflow: hidden; margin-top: 3px; }
        .hp-fill { background: #4caf50; height: 100%; width: 100%; transition: width 0.3s; }

        /* СВЕТЛАЯ МОДЕЛЬКА ЧЕЛОВЕКА */
        .manikin-wrapper { width: 200px; height: 250px; margin: 0 auto 10px auto; background: #1e2026; border-radius: 14px; border: 2px solid #2d303b; padding: 10px; display: flex; justify-content: center; align-items: center; }
        .body-part { fill: #4a4d57; stroke: #787d8d; stroke-width: 2; cursor: pointer; transition: background 0.2s, fill 0.2s; }
        .body-part.attack { fill: #d32f2f !important; stroke: #f44336 !important; }
        .body-part.defend { fill: #1976d2 !important; stroke: #2196f3 !important; }

        /* ЛОГ БОЯ СНИЗУ */
        .battle-log { background: #0c0d0f; border: 1px solid #2a2d36; border-radius: 8px; padding: 10px; height: 130px; overflow-y: auto; text-align: left; font-family: monospace; font-size: 11px; line-height: 1.4; margin-top: 10px; }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #1a1c23; padding-bottom: 2px; }

        /* Кнопка */
        .submit-btn { width: 100%; padding: 14px; background: #ff9800; border: none; color: black; font-size: 15px; font-weight: bold; border-radius: 8px; cursor: pointer; }

        /* Магазин */
        .shop-card { background: #1e2026; border: 1px solid #2d303b; border-radius: 8px; padding: 12px; margin-bottom: 8px; display: flex; align-items: center; justify-content: space-between; }
        .action-btn { background: #4caf50; border: none; color: white; padding: 8px 12px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button id="btn-arena" class="tab-btn active" onclick="switchTab('arena')">⚔️ Арена</button>
        <button id="btn-boss" class="tab-btn" onclick="switchTab('boss')">🐉 Босс</button>
        <button id="btn-shop" class="tab-btn" onclick="switchTab('shop')">🛒 Лавка</button>
    </div>

    <!-- 1. ВКЛАДКА: АРЕНА (ТОЛЬКО БОЙ, СВЕТЛАЯ МОДЕЛЬ И ЛОГ СНИЗУ) -->
    <div id="tab-arena" class="tab-content active">
        <div class="status-container">
            <div class="player-info" style="text-align:left;">
                <span>Вы</span> (<span id="p1-hp">100</span> HP)
                <div class="bar-bg"><div class="hp-fill"></div></div>
            </div>
            <div style="font-size:14px; font-weight:bold; color:#ff9800;">VS</div>
            <div class="player-info" style="text-align:right;">
                <span>Противник</span> (<span id="p2-hp">100</span> HP)
                <div class="bar-bg"><div class="hp-fill" style="background:#f44336;"></div></div>
            </div>
        </div>

        <!-- Светлый макет -->
        <div class="manikin-wrapper">
            <svg width="180" height="230" viewBox="0 0 200 280">
                <circle id="head" class="body-part" cx="100" cy="35" r="22"/>
                <rect id="chest" class="body-part" x="70" y="65" width="60" height="50" rx="6"/>
                <rect id="belly" class="body-part" x="73" y="120" width="54" height="40" rx="6"/>
                <rect id="l_arm" class="body-part" x="35" y="65" width="28" height="80" rx="6"/>
                <rect id="r_arm" class="body-part" x="137" y="65" width="28" height="80" rx="6"/>
                <rect id="leg_left" class="body-part" x="73" y="165" width="24" height="100" rx="6"/>
                <rect id="leg_right" class="body-part" x="103" y="165" width="24" height="100" rx="6"/>
            </svg>
        </div>

        <button class="submit-btn" id="turn-btn" onclick="sendBattleTurn()">⚔️ Совершить ход</button>

        <!-- Лог боя снизу -->
        <div class="battle-log" id="battle-log">
            <div class="log-entry"><span style="color:#666;">[System]</span> Выберите 2 зоны атаки (красные) и 2 защиты (синие).</div>
        </div>
    </div>

    <!-- 2. ВКЛАДКА: БОСС -->
    <div id="tab-boss" class="tab-content">
        <div style="background:#1e2026; padding:20px; border-radius:12px; border:1px solid #d32f2f;">
            <div style="font-size:50px; margin-bottom:10px;">🐉</div>
            <h3 style="margin:5px 0; color:#f44336;">Древний Дракон</h3>
            <p style="font-size:12px; color:#aaa; margin-bottom:15px;">Мировой Босс сервера.</p>
            <button class="submit-btn" style="background:#d32f2f; color:white;" onclick="attackBoss()">🔥 Нанести удар</button>
        </div>
    </div>

    <!-- 3. ВКЛАДКА: ЛАВКА (4 ВИДА ОРУЖИЯ) -->
    <div id="tab-shop" class="tab-content">
        <div class="shop-card">
            <div style="text-align:left;">
                <div style="font-weight:bold;">⚔️ Железный меч</div>
                <div style="font-size:11px; color:#aaa;">+4 к Силе урона</div>
            </div>
            <button class="action-btn" onclick="buyItem('sword')">100 🪙</button>
        </div>
        <div class="shop-card">
            <div style="text-align:left;">
                <div style="font-weight:bold;">🗡️ Кинжал Убийцы</div>
                <div style="font-size:11px; color:#aaa;">+6% к Ловкости</div>
            </div>
            <button class="action-btn" onclick="buyItem('dagger')">120 🪙</button>
        </div>
        <div class="shop-card">
            <div style="text-align:left;">
                <div style="font-weight:bold;">🪓 Двуручный Топор</div>
                <div style="font-size:11px; color:#aaa;">+8% к Удаче</div>
            </div>
            <button class="action-btn" onclick="buyItem('axe')">150 🪙</button>
        </div>
        <div class="shop-card">
            <div style="text-align:left;">
                <div style="font-weight:bold;">🔱 Древний Трезубец</div>
                <div style="font-size:11px; color:#aaa;">+3 Сила, +3% Ловк, +3% Удача</div>
            </div>
            <button class="action-btn" onclick="buyItem('trident')">200 🪙</button>
        </div>
    </div>

    <script>
        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        const bodyParts = ['head', 'chest', 'belly', 'l_arm', 'r_arm', 'leg_left', 'leg_right'];
        let selectedAttacks = [], selectedDefends = [];

        bodyParts.forEach(id => {
            const el = document.getElementById(id);
            if (el) el.onclick = () => togglePartSelect(id, el);
        });

        function togglePartSelect(id, element) {
            if (selectedAttacks.includes(id)) {
                selectedAttacks = selectedAttacks.filter(i => i !== id);
                selectedDefends.push(id);
                element.className.baseVal = 'body-part defend';
            } else if (selectedDefends.includes(id)) {
                selectedDefends = selectedDefends.filter(i => i !== id);
                element.className.baseVal = 'body-part';
            } else {
                if (selectedAttacks.length < 2) {
                    selectedAttacks.push(id);
                    element.className.baseVal = 'body-part attack';
                } else if (selectedDefends.length < 2) {
                    selectedDefends.push(id);
                    element.className.baseVal = 'body-part defend';
                }
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.getElementById('btn-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        function addLogEntry(text) {
            const log = document.getElementById('battle-log');
            const now = new Date().toLocaleTimeString().slice(0, 5);
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = <span style="color:#666;">[${now}]</span> ${text};
            log.appendChild(entry);
            log.scrollTop = log.scrollHeight;
        }

        function sendBattleTurn() {
            if (selectedAttacks.length !== 2 || selectedDefends.length !== 2) {
                alert("Выберите 2 зоны атаки и 2 зоны защиты!");
                return;
            }
            addLogEntry(<span style="color:#ff9800;">Ход отправлен! Ожидание соперника...</span>);
            if (tg) {
                tg.sendData(JSON.stringify({ 
                    type: 'turn', 
                    attacks: selectedAttacks, 
                    defends: selectedDefends 
                }));
            }
        }

        function attackBoss() {
            addLogEntry("🔥 Вы нанесли удар по Дракону!");
            alert("🔥 Удар по Боссу нанесен!");
        }

        function buyItem(itemKey) {
            const names = { sword: 'Железный меч', dagger: 'Кинжал Убийцы', axe: 'Двуручный Топор', trident: 'Древний Трезубец' };
            addLogEntry(🎉 Куплено оружие: ${names[itemKey]});
            alert(🎉 Вы экипировали ${names[itemKey]}!);
        }
    </script>
</body>
</html>
