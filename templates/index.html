<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena of Legends: PvP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .banner {
            text-align: center;
            margin-bottom: 15px;
        }
        .banner img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }
        .card {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        h2 {
            margin-top: 0;
            color: #f39c12;
            text-align: center;
        }
        button {
            background-color: #f39c12;
            color: #121212;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            background-color: #d68910;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Блок с вашей красивой картинкой-превью -->
        <div class="banner">
            <img src="{{ url_for('static', filename='1784659131417.png') }}" alt="Arena of Legends Preview">
        </div>

        <div class="card">
            <h2>⚔️ Арена Героев</h2>
            <p id="player-info">Загрузка профиля...</p>
            <button onclick="findPvP()">Встать в очередь PvP</button>
        </div>
        
        <div class="card" id="rating-card">
            <h2>🏆 Зал славы</h2>
            <div id="leaderboard-list">Загрузка рейтинга...</div>
        </div>
    </div>

    <script>
        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand();

        const user = tg.initDataUnsafe && tg.initDataUnsafe.user ? tg.initDataUnsafe.user : {
            id: 12345,
            first_name: "Гладиатор"
        };

        document.getElementById('player-info').innerHTML = `Игрок: <b>${user.first_name}</b><br>Уровень: 1 | Рейтинг: 0`;

        function findPvP() {
            alert("Поиск противника на арене...");
        }
    </script>

</body>
</html>
