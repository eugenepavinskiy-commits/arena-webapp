<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Лагерь героя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
        }
        .header-stats {
            background: #1e1e1e;
            padding: 8px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 8px;
        }
        .nav-btn {
            background: #2c2c2c;
            color: #fff;
            border: none;
            padding: 8px 2px;
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }
        .nav-btn.active {
            background: #f39c12;
            color: #121212;
            font-weight: bold;
        }
        .class-banner {
            background: #1e1e1e;
            border: 2px solid #f39c12;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 8px;
            color: #f39c12;
            font-weight: bold;
            font-size: 13px;
        }
        .hero-section {
            display: flex;
            gap: 8px;
        }
        .equipment {
            width: 70px;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .equip-slot {
            width: 45px;
            height: 45px;
            background: #2c2c2c;
            border-radius: 6px;
            border: 1px dashed #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stats-box {
            flex-grow: 1;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 10px;
            font-size: 13px;
        }
        .hero-avatar {
            width: 100%;
            max-height: 180px;
            object-fit: cover;
            border-radius: 6px;
            border: 1px solid #f39c12;
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #f39c12; margin: 4px 0 8px 0; font-size: 18px;">ЛАГЕРЬ ГЕРОЯ</h2>

    <div class="header-stats">
        🟡 Золото: 210 | 💎 Камни: 7 | ⭐ Опыт: 0/100 | 🏆 Ранг: 0
    </div>

    <!-- Навигация -->
    <div class="nav-grid">
        <button class="nav-btn">⚔️ PVE</button>
        <button class="nav-btn">🦖 БОСС</button>
        <button class="nav-btn">🛡️ PVP</button>
        <button class="nav-btn active">👤 ГЕРОЙ</button>
        <button class="nav-btn">🛒 ЛАВКА</button>
        <button class="nav-btn">🏛️ АУКЦИОН</button>
        <button class="nav-btn">⛏️ КУЗНЕЦ</button>
        <button class="nav-btn">📜 КЛАСС</button>
    </div>

    <div class="class-banner">
        🛡️ ⚔️<br>ВОИН – ЗАЩИТНИК КОРОЛЕВСТВА
    </div>

    <!-- Основной блок героя с экипировкой и статами -->
    <div class="hero-section">
        <!-- Слоты экипировки слева -->
        <div class="equipment">
            <div style="font-size: 9px; color: #888; margin-bottom: 2px; text-align: center;">ЭКИПИРОВКА</div>
            <div class="equip-slot">🪖</div>
            <div class="equip-slot">📿</div>
            <div class="equip-slot">⚔️</div>
            <div class="equip-slot">🛡️</div>
            <div class="equip-slot">💍</div>
            <div class="equip-slot">👢</div>
        </div>

        <!-- Статы и картинка воина справа -->
        <div class="stats-box">
            <!-- Внедренная картинка воина -->
            <img src="{{ url_for('static', filename='1784660262211.png') }}" alt="Воин" class="hero-avatar">
            
            <p style="margin: 4px 0;"><b>Уровень героя:</b> 1</p>
            <p style="margin: 4px 0;"><b>Класс:</b> Воин</p>
            <hr style="border: 0; border-top: 1px solid #333; margin: 6px 0;">
            <p style="margin: 4px 0;">⚔️ Сила атаки: 10</p>
            <p style="margin: 4px 0;">🏃 Ловкость: 10 (15%)</p>
            <p style="margin: 4px 0;">❤️ Здоровье: 100 / 100</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>

</body>
</html>
