<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Лагерь героя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
        }
        .banner {
            text-align: center;
            margin-bottom: 15px;
        }
        .banner img {
            width: 100%;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.6);
        }
        .card {
            background: #1e1e1e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }
        h2 {
            margin-top: 0;
            color: #f39c12;
            text-align: center;
        }
        button {
            background-color: #e74c3c;
            color: #ffffff;
            border: none;
            padding: 12px;
            width: 100%;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        button:active {
            background-color: #c0392b;
        }
        .nav-buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
            margin-bottom: 15px;
        }
        .nav-btn {
            background: #2c2c2c;
            color: #fff;
            border: none;
            padding: 8px 5px;
            font-size: 12px;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }
        .nav-btn.active {
            background: #f39c12;
            color: #121212;
            font-weight: bold;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
        .class-badge {
            background: #252525;
            border: 2px solid #f39c12;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
            margin-bottom: 15px;
            color: #f39c12;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Главный баннер (превью игры) -->
        <div class="banner">
            <img src="{{ url_for('static', filename='1784659131417.png') }}" alt="Arena of Legends Preview">
        </div>

        <h2 style="text-align: center; color: #f39c12; margin-bottom: 15px;">ЛАГЕРЬ ГЕРОЯ</h2>

        <!-- Навигация по вкладкам -->
        <div class="nav-buttons">
            <button class="nav-btn active" onclick="switchTab('pve', this)">⚔️ PVE</button>
            <button class="nav-btn" onclick="switchTab('boss', this)">🦖 БОСС</button>
            <button class="nav-btn" onclick="switchTab('pvp', this)">🛡️ PVP</button>
            <button class="nav-btn active-tab" onclick="switchTab('hero', this)">👤 ГЕРОЙ</button>
        </div>

        <!-- Вкладка: Герой -->
        <div id="tab-hero" class="tab-content active">
            <div class="class-badge">
                🛡️ ⚔️<br>ВОИН – ЗАЩИТНИК КОРОЛЕВСТВА
            </div>

            <!-- Картинка воина в профиле -->
            <div class="card" style="text-align: center;">
                <img src="{{ url_for('static', filename='1784660262211.png') }}" alt="Воин" style="width: 100%; max-width: 260px; border-radius: 10px; border: 2px solid #f39c12; margin-bottom: 10px;">
                
                <div style="text-align: left;">
                    <p><b>Уровень героя:</b> 1</p>
                    <p><b>Сила атаки:</b> 10</p>
                    <p><b>Ловкость (Уворот):</b> 10 (15%)</p>
                    <p><b>Здоровье:</b> 100 / 100</p>
                </div>
            </div>
        </div>

        <!-- Вкладка: PVE (остальные вкладки для структуры) -->
        <div id="tab-pve" class="tab-content">
            <div class="card">
                <h2>⚔️ Сражение с монстром</h2>
                <button onclick="alert('В бой!')">В БОЙ ПРОТИВ МОНСТРА 🛡️</button>
            </div>
        </div>

        <div id="tab-boss" class="tab-content">
            <div class="card">
                <h2>🦖 Рейд на Босса</h2>
                <p>Скоро здесь появятся эпические боссы!</p>
            </div>
        </div>

        <div id="tab-pvp" class="tab-content">
            <div class="card">
                <h2>🛡️ Арена PvP</h2>
                <button onclick="alert('Поиск соперника...')">Встать в очередь PvP</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        function switchTab(tabName, btnElement) {
            // Скрываем все вкладки
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            // Убираем активный класс у кнопок
            document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
            
            // Показываем нужную вкладку
            document.getElementById('tab-' + tabName).classList.add('active');
            if(btnElement) btnElement.classList.add('active');
        }
    </script>

</body>
</html>
