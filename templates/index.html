<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Лагерь героя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
        }
        .header-stats {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 10px;
        }
        .nav-btn {
            background: #2c2c2c;
            color: #fff;
            border: none;
            padding: 8px 2px;
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }
        .nav-btn.active {
            background: #f39c12;
            color: #121212;
            font-weight: bold;
        }
        .class-banner {
            background: #1e1e1e;
            border: 2px solid #f39c12;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 10px;
            color: #f39c12;
            font-weight: bold;
        }
        .hero-section {
            display: flex;
            gap: 10px;
        }
        .equipment {
            width: 70px;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .equip-slot {
            width: 45px;
            height: 45px;
            background: #2c2c2c;
            border-radius: 6px;
            border: 1px dashed #444;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .stats-box {
            flex-grow: 1;
            background: #1e1e1e;
            border-radius: 8px;
            padding: 12px;
        }
        .hero-avatar {
            width: 100%;
            border-radius: 8px;
            border: 1px solid #f39c12;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #f39c12; margin: 5px 0 10px 0;">ЛАГЕРЬ ГЕРОЯ</h2>

    <div class="header-stats">
        🟡 Золото: 100 | 💎 Камни: 5 | ⭐ Опыт: 0/100 | 🏆 Ранг: 0
    </div>

    <!-- Навигация -->
    <div class="nav-grid">
        <button class="nav-btn" onclick="location.href='#'">⚔️ PVE</button>
        <button class="nav-btn" onclick="location.href='#'">🦖 БОСС</button>
        <button class="nav-btn" onclick="location.href='#'">🛡️ PVP</button>
        <button class="nav-btn active" onclick="location.href='#'">👤 ГЕРОЙ</button>
        <button class="nav-btn" onclick="location.href='#'">🛒 ЛАВКА</button>
        <button class="nav-btn" onclick="location.href='#'">🏛️ АУКЦИОН</button>
        <button class="nav-btn" onclick="location.href='#'">⛏️ КУЗНЕЦ</button>
        <button class="nav-btn" onclick="location.href='#'">📜 КЛАСС</button>
    </div>

    <div class="class-banner">
        🛡️ ⚔️<br>ВОИН – ЗАЩИТНИК КОРОЛЕВСТВА
    </div>

    <!-- Основной блок героя с экипировкой и статами -->
    <div class="hero-section">
        <!-- Слоты экипировки слева -->
        <div class="equipment">
            <div style="font-size: 10px; color: #888; margin-bottom: 2px;">ЭКИПИРОВКА</div>
            <div class="equip-slot">🪖</div>
            <div class="equip-slot">📿</div>
            <div class="equip-slot">⚔️</div>
            <div class="equip-slot">🛡️</div>
            <div class="equip-slot">💍</div>
            <div class="equip-slot">👢</div>
        </div>

        <!-- Статы и картинка воина справа -->
        <div class="stats-box">
            <!-- Внедренная картинка воина -->
            <img src="{{ url_for('static', filename='1784660262211.png') }}" alt="Воин" class="hero-avatar">
            
            <p style="margin: 5px 0;"><b>Уровень:</b> 1</p>
            <p style="margin: 5px 0;"><b>Класс:</b> Воин</p>
            <p style="margin: 5px 0;">⚔️ Сила: 10</p>
            <p style="margin: 5px 0;">🏃 Ловк: 10</p>
            <p style="margin: 5px 0;">❤️ HP: 100</p>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
    </script>

</body>
</html>
