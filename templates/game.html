<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Лагерь героя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            margin: 0;
            padding: 10px;
            font-size: 14px;
        }
        .header-stats {
            background: #1e1e1e;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            margin-bottom: 10px;
            font-size: 13px;
            border: 1px solid #333;
        }
        .nav-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-bottom: 10px;
        }
        .nav-btn {
            background: #2c2c2c;
            color: #fff;
            border: none;
            padding: 8px 2px;
            font-size: 11px;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
        }
        .nav-btn:active {
            transform: scale(0.95);
        }
        .nav-btn.active {
            background: #f39c12;
            color: #121212;
            font-weight: bold;
        }
        .class-banner {
            background: #1e1e1e;
            border: 2px solid #f39c12;
            border-radius: 8px;
            padding: 10px;
            text-align: center;
            margin-bottom: 15px;
            color: #f39c12;
            font-weight: bold;
            font-size: 14px;
            text-transform: uppercase;
        }
        
        /* Визуализация Героя */
        .hero-layout {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .equip-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .equip-slot {
            width: 45px;
            height: 45px;
            background: #252525;
            border: 1px solid #444;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            position: relative;
        }
        .equip-slot.filled {
            border-color: #f39c12;
            background: #2c2c2c;
        }
        .slot-label {
            position: absolute;
            bottom: -12px;
            font-size: 9px;
            color: #888;
            text-align: center;
            width: 100%;
        }
        .hero-avatar-box {
            flex-grow: 1;
            text-align: center;
            padding: 0 10px;
        }
        .hero-avatar {
            width: 100%;
            max-width: 180px;
            border-radius: 8px;
            border: 2px solid #f39c12;
            box-shadow: 0 0 10px rgba(243, 156, 18, 0.3);
        }
        .weapons-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        
        /* Блок детальных статов */
        .stats-panel {
            background: #1e1e1e;
            border-radius: 8px;
            padding: 15px;
            border: 1px solid #333;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            font-size: 13px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px dotted #444;
            padding-bottom: 4px;
        }
        .stat-group-title {
            grid-column: span 2;
            color: #f39c12;
            font-weight: bold;
            text-align: center;
            margin-top: 10px;
            margin-bottom: 5px;
            border-bottom: 1px solid #f39c12;
            padding-bottom: 5px;
        }
        .potion-bar {
            background: #1e1e1e;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .potion-btn {
            background: #e74c3c;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
        }
        .potion-btn:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h2 style="text-align: center; color: #f39c12; margin: 5px 0 10px 0; font-size: 18px;">ЛАГЕРЬ ГЕРОЯ</h2>

    <div class="header-stats" id="header-stats">
        🟡 Золото: 500 | 💎 Камни: 12 | ⭐ Опыт: 450/1000 | 🏆 Ранг: 3
    </div>

    <!-- Интерактивная панель зелий -->
    <div class="potion-bar">
        <span>🧪 Зелья в сумке: <b id="potion-count">1</b> шт.</span>
        <button class="potion-btn" onclick="drinkPotion()">ВЫПИТЬ (+50 HP)</button>
    </div>

    <!-- Навигация с кликабельными кнопками -->
    <div class="nav-grid">
        <button class="nav-btn" onclick="openSection('PVE')">⚔️ PVE</button>
        <button class="nav-btn" onclick="openSection('БОСС')">🦖 БОСС</button>
        <button class="nav-btn" onclick="openSection('PVP')">🛡️ PVP</button>
        <button class="nav-btn active" onclick="openSection('ГЕРОЙ')">👤 ГЕРОЙ</button>
        <button class="nav-btn" onclick="openSection('ЛАВКА')">🛒 ЛАВКА</button>
        <button class="nav-btn" onclick="openSection('АУКЦИОН')">🏛️ АУКЦИОН</button>
        <button class="nav-btn" onclick="openSection('КУЗНЕЦ')">⛏️ КУЗНЕЦ</button>
        <button class="nav-btn" onclick="openSection('КЛАСС')">📜 КЛАСС</button>
    </div>

    <!-- Название класса генерируется скриптом -->
    <div class="class-banner" id="ui-class-name">
        ЗАГРУЗКА КЛАССА...
    </div>

    <!-- Центральный блок: Экипировка и Аватар -->
    <div class="hero-layout">
        <!-- Левая колонка (Броня) -->
        <div class="equip-col">
            <div class="equip-slot" id="slot-head"><span class="slot-label">ШЛЕМ</span></div>
            <div class="equip-slot" id="slot-chest"><span class="slot-label">БРОНЯ</span></div>
            <div class="equip-slot" id="slot-belt"><span class="slot-label">ПОЯС</span></div>
            <div class="equip-slot" id="slot-boots"><span class="slot-label">ОБУВЬ</span></div>
        </div>

        <!-- Аватар по центру -->
        <div class="hero-avatar-box">
            <img src="{{ url_for('static', filename='1784660262211.png') }}" alt="Герой" class="hero-avatar">
        </div>

        <!-- Правая колонка (Кольца) -->
        <div class="equip-col">
            <div class="equip-slot" id="slot-ring1"><span class="slot-label">КОЛЬЦО 1</span></div>
            <div class="equip-slot" id="slot-ring2"><span class="slot-label">КОЛЬЦО 2</span></div>
            <div class="equip-slot" id="slot-ring3"><span class="slot-label">КОЛЬЦО 3</span></div>
            <div class="equip-slot" id="slot-ring4"><span class="slot-label">КОЛЬЦО 4</span></div>
        </div>
    </div>

    <!-- Нижний ряд: Оружие -->
    <div class="weapons-row">
        <div class="equip-slot" id="slot-weapon1" style="width: 55px; height: 55px; font-size: 24px;"><span class="slot-label">ПРАВАЯ</span></div>
        <div class="equip-slot" id="slot-weapon2" style="width: 55px; height: 55px; font-size: 24px;"><span class="slot-label">ЛЕВАЯ</span></div>
    </div>

    <!-- Детальная панель характеристик -->
    <div class="stats-panel">
        <div class="stats-grid" id="ui-stats-grid">
            <!-- Заполняется JavaScript'ом -->
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        // 1. БАЗА КЛАССОВ И САБКЛАССОВ
        const CLASSES = {
            knight: { name: "Рыцарь", armorMult: 1.15, critDmgMult: 1.5, dodgeMult: 1.0 },
            berserk: { name: "Берсерк", armorMult: 0.9, critDmgMult: 1.8, dodgeMult: 1.0 },
            shadow: { name: "Тень", armorMult: 1.0, critDmgMult: 2.0, dodgeMult: 1.2 }
        };

        const SUBCLASSES = {
            none: { name: "", bonus: null },
            dark_knight: { name: "Тёмный Рыцарь", bonus: "Вампиризм 5%" },
            juggernaut: { name: "Джаггернаут", bonus: "+10% Урона Двуручным" }
        };

        // 2. БАЗА ПРЕДМЕТОВ
        const ITEMS_DB = {
            "sword_01": { id: "sword_01", name: "Стальной Меч", type: "weapon1", icon: "⚔️", stats: { atk: 15, str: 2 } },
            "shield_01": { id: "shield_01", name: "Тяжелый Щит", type: "weapon2", icon: "🛡️", stats: { armor: 20, blockChance: 15, end: 5 } },
            "ring_luck": { id: "ring_luck", name: "Кольцо Фортуны", type: "ring", icon: "💍", stats: { luk: 15, critChance: 2 } },
            "armor_01": { id: "armor_01", name: "Латный Доспех", type: "chest", icon: "🥋", stats: { armor: 35, end: 10, str: 3 } }
        };

        // 3. СОСТОЯНИЕ ГЕРОЯ
        let hero = {
            level: 5,
            baseClass: "knight",
            subClass: "dark_knight",
            hp: 350,
            maxHp: 350,
            potions: 1,
            baseStats: {
                str: 15, // Сила
                agi: 10, // Ловкость
                end: 20, // Выносливость
                int: 5,  // Интеллект
                luk: 5   // Удача
            },
            equipment: {
                head: null,
                chest: ITEMS_DB["armor_01"],
                belt: null,
                boots: null,
                weapon1: ITEMS_DB["sword_01"],
                weapon2: ITEMS_DB["shield_01"],
                ring1: ITEMS_DB["ring_luck"],
                ring2: null,
                ring3: null,
                ring4: null
            },
            finalStats: {}
        };

        // 4. ДВИЖОК РАСЧЕТА ХАРАКТЕРИСТИК
        function calculateStats() {
            let total = {
                str: hero.baseStats.str,
                agi: hero.baseStats.agi,
                end: hero.baseStats.end,
                int: hero.baseStats.int,
                luk: hero.baseStats.luk,
                armor: 0,
                atk: 0,
                critChance: 5,
                critDmg: 150,
                dodge: 0,
                blockChance: 0,
                armorPen: 0
            };

            for (let key in hero.equipment) {
                let item = hero.equipment[key];
                if (item && item.stats) {
                    if (item.stats.str) total.str += item.stats.str;
                    if (item.stats.agi) total.agi += item.stats.agi;
                    if (item.stats.end) total.end += item.stats.end;
                    if (item.stats.int) total.int += item.stats.int;
                    if (item.stats.luk) total.luk += item.stats.luk;
                    if (item.stats.armor) total.armor += item.stats.armor;
                    if (item.stats.atk) total.atk += item.stats.atk;
                    if (item.stats.critChance) total.critChance += item.stats.critChance;
                    if (item.stats.blockChance) total.blockChance += item.stats.blockChance;
                }
            }

            let hp = total.end * 10;
            let damage = total.str * 2 + total.atk;
            total.critChance += (total.agi / 5) + (total.luk / 10);
            total.dodge += (total.agi / 4);
            let dropMultiplier = 1.0 + (total.luk / 100);

            let cls = CLASSES[hero.baseClass];
            total.armor = Math.floor(total.armor * cls.armorMult);
            total.critDmg = Math.floor(total.critDmg * cls.critDmgMult / 1.5);
            total.dodge = total.dodge * cls.dodgeMult;

            hero.maxHp = hp;
            hero.finalStats = {
                hp: hp,
                damage: damage,
                armor: total.armor,
                critChance: total.critChance.toFixed(1),
                critDmg: total.critDmg,
                dodge: total.dodge.toFixed(1),
                blockChance: total.blockChance,
                dropMult: dropMultiplier.toFixed(2),
                str: total.str, agi: total.agi, end: total.end, int: total.int, luk: total.luk
            };
        }

        // 5. ОБНОВЛЕНИЕ ИНТЕРФЕЙСА
        function updateUI() {
            let clsName = CLASSES[hero.baseClass].name;
            let subName = SUBCLASSES[hero.subClass].name;
            document.getElementById("ui-class-name").innerHTML = `🛡️ ⚔️<br>${subName ? subName : clsName} (Ур. ${hero.level})`;

            const slots = ["head", "chest", "belt", "boots", "weapon1", "weapon2", "ring1", "ring2", "ring3", "ring4"];
            slots.forEach(slot => {
                let el = document.getElementById("slot-" + slot);
                if (el) {
                    if (hero.equipment[slot]) {
                        el.innerHTML = `${hero.equipment[slot].icon}<span class="slot-label">${getSlotName(slot)}</span>`;
                        el.classList.add("filled");
                    } else {
                        el.innerHTML = `<span style="color:#444;">?</span><span class="slot-label">${getSlotName(slot)}</span>`;
                        el.classList.remove("filled");
                    }
                }
            });

            // Обновляем счетчик зелий
            let potionEl = document.getElementById("potion-count");
            if (potionEl) potionEl.innerText = hero.potions;

            const statsHtml = `
                <div class="stat-group-title">БАзовые Характеристики</div>
                <div class="stat-item"><span>⚔️ Сила (Урон/Вес)</span> <b>${hero.finalStats.str}</b></div>
                <div class="stat-item"><span>🏃 Ловкость (Уворот/Крит)</span> <b>${hero.finalStats.agi}</b></div>
                <div class="stat-item"><span>❤️ Выносливость (HP)</span> <b>${hero.finalStats.end}</b></div>
                <div class="stat-item"><span>🧠 Интеллект (Магия)</span> <b>${hero.finalStats.int}</b></div>
                <div class="stat-item"><span>🍀 Удача (Дроп/Крит)</span> <b>${hero.finalStats.luk}</b></div>
                
                <div class="stat-group-title">Боевые Характеристики</div>
                <div class="stat-item"><span>🩸 Здоровье</span> <b style="color:#e74c3c;">${hero.hp} / ${hero.finalStats.hp}</b></div>
                <div class="stat-item"><span>🗡️ Физ. Урон</span> <b>${hero.finalStats.damage}</b></div>
                <div class="stat-item"><span>🛡️ Броня</span> <b>${hero.finalStats.armor}</b></div>
                <div class="stat-item"><span>⚡ Шанс Крита</span> <b>${hero.finalStats.critChance}%</b></div>
                <div class="stat-item"><span>💥 Урон Крита</span> <b>${hero.finalStats.critDmg}%</b></div>
                <div class="stat-item"><span>💨 Шанс Уклонения</span> <b>${hero.finalStats.dodge}%</b></div>
                <div class="stat-item"><span>🔰 Шанс Блока</span> <b>${hero.finalStats.blockChance}%</b></div>
                
                <div class="stat-group-title">Глобальные Эффекты</div>
                <div class="stat-item"><span>🎁 Множитель лута</span> <b>x${hero.finalStats.dropMult}</b></div>
            `;
            let grid = document.getElementById("ui-stats-grid");
            if (grid) grid.innerHTML = statsHtml;
        }

        function getSlotName(slotId) {
            const names = {
                head: "ШЛЕМ", chest: "БРОНЯ", belt: "ПОЯС", boots: "ОБУВЬ",
                weapon1: "ПРАВАЯ", weapon2: "ЛЕВАЯ",
                ring1: "КОЛЬЦО 1", ring2: "КОЛЬЦО 2", ring3: "КОЛЬЦО 3", ring4: "КОЛЬЦО 4"
            };
            return names[slotId];
        }

        // 6. ЛОГИКА ИНТЕРАКТИВА (Кнопки и Зелья)
        function openSection(sectionName) {
            if (sectionName === 'ГЕРОЙ') {
                return; // мы уже здесь
            }
            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
            alert("Раздел '" + sectionName + "' в разработке!");
        }

        function drinkPotion() {
            if (hero.potions > 0) {
                if (hero.hp >= hero.finalStats.hp) {
                    alert("Здоровье уже максимальное!");
                    return;
                }
                hero.potions--;
                hero.hp = Math.min(hero.finalStats.hp, hero.hp + 50);
                updateUI();
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('success');
                }
            } else {
                if (tg && tg.HapticFeedback) {
                    tg.HapticFeedback.notificationOccurred('error');
                }
                alert("У вас нет зелий в сумке!");
            }
        }

        // Запуск при старте
        calculateStats();
        updateUI();
    </script>
</body>
</html>
