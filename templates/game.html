<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game - Лагерь героя</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #0d0d0f;
            color: #e4e4e7;
            margin: 0;
            padding: 8px;
            font-size: 12px;
            padding-bottom: 20px;
        }
        
        /* 1. КОМПАКТНАЯ ШАПКА */
        .top-dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #18181b;
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #27272a;
            margin-bottom: 8px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .resources { font-weight: bold; color: #fbbf24; font-size: 11px; }
        .resources span { color: #fff; margin-right: 6px; }
        .potion-btn {
            background: #dc2626; color: white; border: none;
            padding: 5px 10px; border-radius: 6px; font-weight: bold; font-size: 10px; cursor: pointer;
        }
        .potion-btn:active { transform: scale(0.95); }

        /* 2. НАВИГАЦИЯ */
        .nav-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; margin-bottom: 8px;
        }
        .nav-btn {
            background: #27272a; color: #a1a1aa; border: 1px solid #3f3f46;
            padding: 6px 0; font-size: 10px; border-radius: 6px; cursor: pointer;
        }
        .nav-btn.active { background: #f59e0b; color: #000; border-color: #f59e0b; font-weight: bold; }

        /* 3. БАННЕР КЛАССА */
        .class-banner {
            background: linear-gradient(90deg, #18181b 0%, #27272a 50%, #18181b 100%);
            border: 1px solid #f59e0b; border-radius: 6px;
            padding: 6px; text-align: center; margin-bottom: 10px;
            color: #f59e0b; font-weight: bold; font-size: 13px;
        }

        /* 4. БЛОК ГЕРОЯ И ЭКИПИРОВКИ */
        .hero-layout {
            display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
        }
        .equip-col { display: flex; flex-direction: column; gap: 6px; width: 45px; }
        .equip-slot {
            width: 44px; height: 44px;
            background: #18181b; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            position: relative; cursor: pointer;
            transition: transform 0.1s;
        }
        .equip-slot:active { transform: scale(0.9); }
        
        /* ПРИЗРАЧНЫЕ СИЛУЭТЫ (Ключевая фишка UI) */
        .equip-slot.empty { border: 1px dashed #3f3f46; background: #121214; }
        .silhouette { font-size: 22px; opacity: 0.15; filter: grayscale(100%); }
        
        /* НАДЕТАЯ ВЕЩЬ */
        .equip-slot.filled { border: 1px solid #f59e0b; background: #27272a; box-shadow: 0 0 6px rgba(245, 158, 11, 0.2); }
        .item-icon { font-size: 22px; filter: drop-shadow(0 0 2px rgba(245,158,11,0.5)); }
        
        .slot-label {
            position: absolute; bottom: -8px; font-size: 7px; color: #71717a; text-transform: uppercase; font-weight: bold; width: 100%; text-align: center;
        }
        .hero-avatar-box { flex-grow: 1; padding: 0 8px; text-align: center; }
        .hero-avatar {
            width: 100%; max-width: 140px; border-radius: 8px; border: 1px solid #f59e0b; box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
        }
        .weapons-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 15px; }

        /* 5. ИНВЕНТАРЬ */
        .inventory-panel {
            background: #18181b; border-radius: 8px; padding: 10px; border: 1px solid #27272a; margin-bottom: 10px;
        }
        .inventory-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; margin-top: 6px; }
        .inv-item {
            aspect-ratio: 1; background: #27272a; border-radius: 6px;
            display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer;
        }
        .inv-item.filled { border: 1px solid #71717a; }
        .inv-item.empty { background: #121214; border: 1px dashed #3f3f46; cursor: default; }

        /* 6. СТАТЫ В ДВЕ КОЛОНКИ (Решение проблемы скролла) */
        .stats-two-column {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
        }
        .stats-card {
            background: #18181b; border-radius: 8px; padding: 10px; border: 1px solid #27272a;
        }
        .stat-group-title {
            color: #f59e0b; font-weight: bold; text-align: center; font-size: 10px;
            text-transform: uppercase; border-bottom: 1px solid #3f3f46; padding-bottom: 4px; margin-bottom: 6px;
        }
        .stat-item {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px dotted #27272a; padding-bottom: 3px; margin-bottom: 3px; font-size: 10px;
        }
        .add-stat-btn {
            background: #f59e0b; color: #000; border: none; border-radius: 4px;
            width: 18px; height: 18px; font-weight: bold; cursor: pointer; margin-left: 5px;
        }
        .unspent-points-banner {
            background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid #10b981;
            padding: 4px; border-radius: 4px; text-align: center; font-weight: bold; margin-bottom: 6px; font-size: 10px;
        }
    </style>
</head>
<body>

    <!-- Шапка (Золото и Зелья на одной линии) -->
    <div class="top-dashboard">
        <div class="resources">
            💰 <span>500</span> 💎 <span>12</span> 🏆 <span>3</span>
        </div>
        <button class="potion-btn" onclick="drinkPotion()">🧪 <span id="potion-count">1</span> (+50 HP)</button>
    </div>

    <!-- Навигация -->
    <div class="nav-grid">
        <button class="nav-btn" onclick="openSection('PVE')">⚔️ PVE</button>
        <button class="nav-btn" onclick="openSection('БОСС')">🦖 БОСС</button>
        <button class="nav-btn" onclick="openSection('PVP')">🛡️ PVP</button>
        <button class="nav-btn active" onclick="openSection('ГЕРОЙ')">👤 ГЕРОЙ</button>
        <button class="nav-btn" onclick="openSection('ЛАВКА')">🛒 ЛАВКА</button>
        <button class="nav-btn" onclick="openSection('АУКЦИОН')">🏛️ АУКЦИОН</button>
        <button class="nav-btn" onclick="openSection('КУЗНЕЦ')">⛏️ КУЗНЕЦ</button>
        <button class="nav-btn" onclick="openSection('КЛАСС')">📜 КЛАСС</button>
    </div>

    <div class="class-banner" id="ui-class-name">ЗАГРУЗКА...</div>

    <!-- Сетка экипировки с силуэтами -->
    <div class="hero-layout">
        <div class="equip-col">
            <div class="equip-slot empty" id="slot-head" data-sil="🪖" onclick="unequipSlot('head')"></div>
            <div class="equip-slot empty" id="slot-chest" data-sil="🦺" onclick="unequipSlot('chest')"></div>
            <div class="equip-slot empty" id="slot-belt" data-sil="➰" onclick="unequipSlot('belt')"></div>
            <div class="equip-slot empty" id="slot-boots" data-sil="👢" onclick="unequipSlot('boots')"></div>
        </div>

        <div class="hero-avatar-box">
            <img src="{{ url_for('static', filename='1784660262211.png') }}" alt="Герой" class="hero-avatar">
        </div>

        <div class="equip-col">
            <div class="equip-slot empty" id="slot-ring1" data-sil="💍" onclick="unequipSlot('ring1')"></div>
            <div class="equip-slot empty" id="slot-ring2" data-sil="💍" onclick="unequipSlot('ring2')"></div>
            <div class="equip-slot empty" id="slot-ring3" data-sil="💍" onclick="unequipSlot('ring3')"></div>
            <div class="equip-slot empty" id="slot-ring4" data-sil="💍" onclick="unequipSlot('ring4')"></div>
        </div>
    </div>

    <div class="weapons-row">
        <div class="equip-slot empty" id="slot-weapon1" data-sil="⚔️" style="width: 50px; height: 50px;" onclick="unequipSlot('weapon1')"></div>
        <div class="equip-slot empty" id="slot-weapon2" data-sil="🛡️" style="width: 50px; height: 50px;" onclick="unequipSlot('weapon2')"></div>
    </div>

    <!-- Инвентарь -->
    <div class="inventory-panel">
        <div class="stat-group-title" style="margin-bottom:0; border:none;">🎒 Сумка (Инвентарь)</div>
        <div class="inventory-grid" id="ui-inventory-grid"></div>
    </div>

    <!-- ДВУХКОЛОНОЧНЫЕ СТАТЫ (Компактность!) -->
    <div class="stats-two-column" id="ui-stats-container">
        <!-- Заполняется через JS -->
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();

        const CLASSES = {
            knight: { name: "Рыцарь", icon: "🛡️⚔️", armorMult: 1.15, critDmgMult: 1.5, dodgeMult: 1.0 },
            berserk: { name: "Берсерк", icon: "🪓🔥", armorMult: 0.9, critDmgMult: 1.8, dodgeMult: 1.0 },
            shadow: { name: "Тень", icon: "🗡️🌑", armorMult: 1.0, critDmgMult: 2.0, dodgeMult: 1.2 }
        };

        const SUBCLASSES = { none: { name: "" }, dark_knight: { name: "Тёмный Рыцарь" }, juggernaut: { name: "Джаггернаут" } };

        const ITEMS_DB = {
            "sword_01": { id: "sword_01", name: "Стальной Меч", type: "weapon1", icon: "🗡️", stats: { atk: 15, str: 2 } },
            "shield_01": { id: "shield_01", name: "Тяжелый Щит", type: "weapon2", icon: "🛡️", stats: { armor: 20, blockChance: 15, end: 5 } },
            "ring_luck": { id: "ring_luck", name: "Кольцо Фортуны", type: "ring", icon: "💍", stats: { luk: 15, critChance: 2 } },
            "armor_01": { id: "armor_01", name: "Латный Доспех", type: "chest", icon: "🥋", stats: { armor: 35, end: 10, str: 3 } }
        };

        let hero = {
            name: "Гладиатор", level: 5, unspentPoints: 15, baseClass: "knight", subClass: "dark_knight",
            hp: 200, maxHp: 200, potions: 1,
            baseStats: { str: 10, agi: 10, end: 10, mst: 10, luk: 5 },
            equipment: { head: null, chest: null, belt: null, boots: null, weapon1: null, weapon2: null, ring1: null, ring2: null, ring3: null, ring4: null },
            inventory: ["sword_01", "armor_01", "shield_01", "ring_luck"],
            finalStats: {}
        };

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) hero.name = tg.initDataUnsafe.user.first_name || "Гладиатор";

        function equipItem(invIndex) {
            let itemId = hero.inventory[invIndex];
            if (!itemId) return;
            let item = ITEMS_DB[itemId];
            let targetSlot = item.type;

            if (item.type === 'ring') {
                if (!hero.equipment.ring1) targetSlot = 'ring1';
                else if (!hero.equipment.ring2) targetSlot = 'ring2';
                else if (!hero.equipment.ring3) targetSlot = 'ring3';
                else if (!hero.equipment.ring4) targetSlot = 'ring4';
                else targetSlot = 'ring1';
            }

            let oldItem = hero.equipment[targetSlot];
            hero.equipment[targetSlot] = item;
            hero.inventory.splice(invIndex, 1);
            if (oldItem) hero.inventory.push(oldItem.id);

            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('medium');
            calculateStats(); updateUI();
        }

        function unequipSlot(slotKey) {
            let item = hero.equipment[slotKey];
            if (!item) return;
            if (hero.inventory.length >= 10) {
                alert("Сумка полна!"); return;
            }
            hero.inventory.push(item.id);
            hero.equipment[slotKey] = null;
            if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
            calculateStats(); updateUI();
        }

        function addStat(statKey) {
            if (hero.unspentPoints > 0) {
                hero.baseStats[statKey]++; hero.unspentPoints--;
                if (tg && tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
                calculateStats(); updateUI();
            }
        }

        function calculateStats() {
            let total = {
                str: hero.baseStats.str, agi: hero.baseStats.agi, end: hero.baseStats.end, mst: hero.baseStats.mst, luk: hero.baseStats.luk,
                armor: 0, atk: 0, critChance: 5, critDmg: 150, dodge: 0, blockChance: 0, armorPen: 0
            };

            for (let key in hero.equipment) {
                let item = hero.equipment[key];
                if (item && item.stats) {
                    if (item.stats.str) total.str += item.stats.str;
                    if (item.stats.agi) total.agi += item.stats.agi;
                    if (item.stats.end) total.end += item.stats.end;
                    if (item.stats.mst) total.mst += item.stats.mst;
                    if (item.stats.luk) total.luk += item.stats.luk;
                    if (item.stats.armor) total.armor += item.stats.armor;
                    if (item.stats.atk) total.atk += item.stats.atk;
                    if (item.stats.critChance) total.critChance += item.stats.critChance;
                    if (item.stats.blockChance) total.blockChance += item.stats.blockChance;
                }
            }

            let hp = total.end * 10;
            let damage = total.str * 2 + total.atk;
            total.critChance += (total.luk / 5); total.dodge += (total.agi / 4);      
            total.armorPen = total.mst * 2; total.critDmg += total.mst * 3;      

            let cls = CLASSES[hero.baseClass];
            total.armor = Math.floor(total.armor * cls.armorMult);
            total.critDmg = Math.floor(total.critDmg * cls.critDmgMult / 1.5);
            total.dodge = total.dodge * cls.dodgeMult;

            hero.maxHp = hp; if (hero.hp > hero.maxHp) hero.hp = hero.maxHp;

            hero.finalStats = {
                hp: hp, damage: damage, armor: total.armor, armorPen: total.armorPen,
                critChance: total.critChance.toFixed(1), critDmg: total.critDmg,
                dodge: total.dodge.toFixed(1), blockChance: total.blockChance,
                str: total.str, agi: total.agi, end: total.end, mst: total.mst, luk: total.luk
            };
        }

        function getSlotName(slotId) {
            const names = { head: "Шлем", chest: "Броня", belt: "Пояс", boots: "Обувь", weapon1: "Оружие", weapon2: "Щит", ring1: "Кольцо", ring2: "Кольцо", ring3: "Кольцо", ring4: "Кольцо" };
            return names[slotId];
        }

        function updateUI() {
            let cls = CLASSES[hero.baseClass];
            let subName = SUBCLASSES[hero.subClass].name;
            let classTitle = subName ? subName : cls.name;
            
            document.getElementById("ui-class-name").innerHTML = `${cls.icon} ${hero.name} <span style="font-size:11px; color:#a1a1aa; font-weight:normal;">[${classTitle} • Ур. ${hero.level}]</span>`;
            document.getElementById("potion-count").innerText = hero.potions;

            // Рендер экипировки (Призрачные силуэты)
            const slots = ["head", "chest", "belt", "boots", "weapon1", "weapon2", "ring1", "ring2", "ring3", "ring4"];
            slots.forEach(slotKey => {
                let el = document.getElementById("slot-" + slotKey);
                if (el) {
                    let sil = el.getAttribute("data-sil") || "";
                    let slotNameRu = getSlotName(slotKey);
                    let item = hero.equipment[slotKey];
                    el.classList.remove("empty", "filled");
                    if (item && item.icon) {
                        el.innerHTML = `<div class="item-icon">${item.icon}</div><span class="slot-label">${slotNameRu}</span>`;
                        el.classList.add("filled");
                    } else {
                        el.innerHTML = `<div class="silhouette">${sil}</div><span class="slot-label">${slotNameRu}</span>`;
                        el.classList.add("empty");
                    }
                }
            });

            // Рендер Сумки
            let invHtml = '';
            for (let i = 0; i < 10; i++) {
                if (i < hero.inventory.length) {
                    let item = ITEMS_DB[hero.inventory[i]];
                    invHtml += `<div class="inv-item filled" onclick="equipItem(${i})">${item.icon}</div>`;
                } else { invHtml += `<div class="inv-item empty"></div>`; }
            }
            document.getElementById("ui-inventory-grid").innerHTML = invHtml;

            // Рендер Двухколоночных Статов
            let btnStr = hero.unspentPoints > 0 ? `<button class="add-stat-btn" onclick="addStat('str')">+</button>` : ``;
            let btnAgi = hero.unspentPoints > 0 ? `<button class="add-stat-btn" onclick="addStat('agi')">+</button>` : ``;
            let btnEnd = hero.unspentPoints > 0 ? `<button class="add-stat-btn" onclick="addStat('end')">+</button>` : ``;
            let btnMst = hero.unspentPoints > 0 ? `<button class="add-stat-btn" onclick="addStat('mst')">+</button>` : ``;
            let btnLuk = hero.unspentPoints > 0 ? `<button class="add-stat-btn" onclick="addStat('luk')">+</button>` : ``;
            let unspentHtml = hero.unspentPoints > 0 ? `<div class="unspent-points-banner">✨ Очков прокачки: ${hero.unspentPoints} ✨</div>` : ``;

            document.getElementById("ui-stats-container").innerHTML = `
                <div class="stats-card">
                    <div class="stat-group-title">База (Прокачка)</div>
                    ${unspentHtml}
                    <div class="stat-item"><span>⚔️ Сила</span> <div><b>${hero.finalStats.str}</b>${btnStr}</div></div>
                    <div class="stat-item"><span>🏃 Ловкость</span> <div><b>${hero.finalStats.agi}</b>${btnAgi}</div></div>
                    <div class="stat-item"><span>❤️ Выносл-ть</span> <div><b>${hero.finalStats.end}</b>${btnEnd}</div></div>
                    <div class="stat-item"><span>🎯 Мастерство</span> <div><b>${hero.finalStats.mst}</b>${btnMst}</div></div>
                    <div class="stat-item"><span>🍀 Удача</span> <div><b>${hero.finalStats.luk}</b>${btnLuk}</div></div>
                </div>
                <div class="stats-card">
                    <div class="stat-group-title">Боевые параметры</div>
                    <div class="stat-item"><span>🩸 HP</span> <b style="color:#ef4444;">${hero.hp} / ${hero.finalStats.hp}</b></div>
                    <div class="stat-item"><span>🗡️ Урон</span> <b>${hero.finalStats.damage}</b></div>
                    <div class="stat-item"><span>🛡️ Броня</span> <b>${hero.finalStats.armor}</b></div>
                    <div class="stat-item"><span>⛏️ Пробитие</span> <b style="color:#f59e0b;">${hero.finalStats.armorPen}</b></div>
                    <div class="stat-item"><span>⚡ Крит</span> <b>${hero.finalStats.critChance}%</b></div>
                    <div class="stat-item"><span>💥 Сила Крита</span> <b>${hero.finalStats.critDmg}%</b></div>
                    <div class="stat-item"><span>💨 Уворот</span> <b>${hero.finalStats.dodge}%</b></div>
                    <div class="stat-item"><span>🔰 Блок</span> <b>${hero.finalStats.blockChance}%</b></div>
                </div>
            `;
        }

        function drinkPotion() {
            if (hero.potions > 0) {
                if (hero.hp >= hero.finalStats.hp) return alert("Здоровье полное!");
                hero.potions--; hero.hp = Math.min(hero.finalStats.hp, hero.hp + 50); updateUI();
                if (tg && tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            } else { alert("Нет зелий!"); }
        }
        function openSection(sn) { if (sn !== 'ГЕРОЙ') alert("Раздел '" + sn + "' в разработке!"); }

        calculateStats(); updateUI();
    </script>
</body>
</html>
